<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Trainingsplan</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');
:root{--bg:#0d0d0f;--surface:#18181c;--surface2:#222228;--surface3:#2c2c35;--accent:#c8f135;--accent2:#8bbb1a;--text:#f0f0f0;--muted:#6b6b7a;--done:#1e2e08;--done-border:#6da010;--danger:#ff4d4d;--radius:16px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
.header{background:var(--surface);padding:52px 16px 12px;border-bottom:1px solid #2a2a33;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.header-top h1{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--accent);line-height:1}
.header-top p{font-size:11px;color:var(--muted);margin-top:1px}
.prw{position:relative;width:46px;height:46px;flex-shrink:0}
.prw svg{transform:rotate(-90deg)}
.pr-bg{fill:none;stroke:var(--surface2);stroke-width:4}
.pr-bar{fill:none;stroke:var(--accent);stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset .4s}
.pr-txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--accent)}
.plan-switcher{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.plan-switcher::-webkit-scrollbar{display:none}
.plan-chip{background:var(--surface2);border:1.5px solid #3a3a45;border-radius:20px;padding:5px 14px;font-size:13px;font-weight:600;color:var(--muted);white-space:nowrap;cursor:pointer;flex-shrink:0;transition:all .15s}
.plan-chip.active{background:var(--accent);border-color:var(--accent);color:#0d0d0f}
.plan-chip-add{background:transparent;border:1.5px dashed #3a3a45;border-radius:20px;padding:5px 14px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;flex-shrink:0}
.screen{display:none;padding:16px;padding-bottom:110px}
.screen.active{display:block}
.phase-card{border-radius:var(--radius);padding:12px 16px;margin-bottom:10px;border:1px solid #2a2a33}
.phase-label{font-size:10px;font-weight:600;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:2px}
.phase-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px}
.exercise-item{background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:9px;border:1px solid #2a2a33;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .2s,background .2s;-webkit-user-select:none}
.exercise-item.done{background:var(--done);border-color:var(--done-border)}
.ex-icon{width:42px;height:42px;border-radius:12px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.exercise-item.done .ex-icon{background:var(--done)}
.ex-info{flex:1;min-width:0}
.ex-muscle{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:1px}
.ex-name{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-meta{font-size:11px;color:var(--muted);margin-top:1px}
.ex-dots{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.dot{width:9px;height:9px;border-radius:50%;background:var(--surface2);border:1.5px solid var(--muted)}
.dot.done{background:var(--accent);border-color:var(--accent)}
.ex-arrow{color:var(--muted);font-size:18px;flex-shrink:0}
.exercise-item.done .ex-arrow{color:var(--done-border)}
.btn-primary{background:var(--accent);color:#0d0d0f;border:none;border-radius:var(--radius);font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:2px;padding:15px 20px;width:100%;cursor:pointer;transition:transform .1s;margin-top:10px}
.btn-primary:active{transform:scale(.97)}
.btn-primary:disabled{background:var(--done-border);opacity:.7}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid #3a3a45;border-radius:var(--radius);font-size:14px;font-weight:600;padding:12px 16px;width:100%;cursor:pointer;margin-top:8px}
.btn-outline{background:transparent;color:var(--accent);border:1.5px solid var(--accent);border-radius:var(--radius);font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;padding:13px 20px;width:100%;cursor:pointer;margin-top:6px}
.btn-danger{background:transparent;color:var(--danger);border:1px solid var(--danger);border-radius:var(--radius);font-size:13px;font-weight:600;padding:10px 16px;cursor:pointer;margin-top:8px;width:100%}
.detail-header{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.back-btn{background:var(--surface);border:1px solid #2a2a33;color:var(--text);border-radius:12px;width:40px;height:40px;min-width:40px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer}
.detail-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;line-height:1.1}
.detail-sub{font-size:11px;color:var(--muted);margin-top:2px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.info-box{background:var(--surface);border-radius:var(--radius);border:1px solid #2a2a33;padding:12px}
.ib-label{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.ib-val{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);margin-top:1px}
.ib-sub{font-size:10px;color:var(--muted)}
.note-box{background:var(--surface2);border-radius:12px;padding:12px 14px;border-left:3px solid var(--accent);font-size:13px;color:#c0c0c0;margin-bottom:14px}
.sec-label{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;color:var(--muted);margin:16px 0 10px}
.set-row{background:var(--surface);border-radius:var(--radius);border:1px solid #2a2a33;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;transition:all .2s}
.set-row.done-row{background:var(--done);border-color:var(--done-border)}
.set-row.locked{opacity:.35;pointer-events:none}
.sr-left{display:flex;align-items:center;gap:12px;flex:1;min-width:0;cursor:pointer}
.sr-num{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--muted);width:18px;flex-shrink:0}
.set-row.done-row .sr-num{color:var(--accent)}
.sr-label{font-size:14px;font-weight:500}
.sr-sub{font-size:11px;color:var(--muted);margin-top:1px}
.chk{background:var(--surface2);border:1.5px solid var(--muted);border-radius:50%;width:34px;height:34px;min-width:34px;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;flex-shrink:0;cursor:pointer}
.set-row.done-row .chk{background:var(--accent);border-color:var(--accent);color:#0d0d0f}
.wbadge{background:var(--surface2);border:1px solid #3a3a45;border-radius:8px;padding:2px 8px;font-size:12px;font-weight:600;color:var(--accent);margin-left:6px}
.sw-wrap{display:flex;align-items:center;gap:8px;margin-top:6px}
.sw-time{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--accent);min-width:52px}
.sw-btn{background:var(--surface2);border:1.5px solid #3a3a45;border-radius:8px;padding:4px 10px;font-size:12px;font-weight:600;color:var(--text);cursor:pointer;white-space:nowrap}
.sw-btn.active{background:#ff9f1c;border-color:#ff9f1c;color:#0d0d0f}
.ex-timer{background:var(--surface2);border-radius:var(--radius);border:1px solid #3a3a45;padding:16px;margin-bottom:14px;text-align:center}
.et-disp{font-family:'Bebas Neue',sans-serif;font-size:56px;letter-spacing:4px;color:var(--accent);line-height:1;margin-bottom:4px}
.et-disp.running{color:#fff}.et-disp.finished{color:var(--done-border)}
.et-lbl{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.et-bar-wrap{background:var(--surface3);border-radius:4px;height:4px;margin-bottom:14px;overflow:hidden}
.et-bar{height:100%;background:var(--accent);border-radius:4px;transition:width .5s linear;width:100%}
.et-bar.running{background:#fff}.et-bar.finished{background:var(--done-border)}
.et-btns{display:flex;gap:8px}
.et-btn{flex:1;border:none;border-radius:12px;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1px;padding:12px 8px;cursor:pointer}
.et-btn.start{background:var(--accent);color:#0d0d0f}.et-btn.stop{background:#ff9f1c;color:#0d0d0f}.et-btn.reset{background:var(--surface3);color:var(--muted);flex:0 0 48px}
.timer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);backdrop-filter:blur(12px);z-index:200;flex-direction:column;align-items:center;justify-content:center;gap:22px}
.timer-overlay.active{display:flex}
.tov-lbl{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:3px;color:var(--muted)}
.tov-circle{position:relative;width:180px;height:180px}
.tov-circle svg{transform:rotate(-90deg);width:100%;height:100%}
.tov-bg{fill:none;stroke:var(--surface);stroke-width:8}
.tov-bar{fill:none;stroke:var(--accent);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .1s linear}
.tov-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:54px;color:var(--accent)}
.tov-next{font-size:13px;color:var(--muted);text-align:center}
.tov-next strong{color:var(--text)}
.tov-skip{background:var(--surface);border:1px solid #2a2a33;color:var(--text);border-radius:var(--radius);font-size:15px;font-weight:500;padding:12px 36px;cursor:pointer}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid #2a2a33;display:flex;padding:10px 0 28px;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:20px;transition:color .2s}
.nav-btn.active{color:var(--accent)}
.nav-btn span{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.s-row{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.s-lbl{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.s-inp{background:var(--surface2);border:1.5px solid #3a3a45;border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;padding:10px 12px;width:100%;outline:none;-webkit-appearance:none;appearance:none}
.s-inp:focus{border-color:var(--accent)}
.s-row-2{display:flex;gap:8px}
.s-row-2 .s-row{flex:1}
.g-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid #222}
.g-row:last-child{border-bottom:none}
.g-lbl{font-size:14px;font-weight:500}
.g-sub{font-size:11px;color:var(--muted);margin-top:2px}
.g-val{background:var(--surface2);border:1.5px solid #3a3a45;border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;padding:8px 10px;width:80px;text-align:center;outline:none;-webkit-appearance:none;appearance:none}
.g-val:focus{border-color:var(--accent)}
.g-val.wide{width:130px;text-align:left}
.type-toggle{display:flex;background:var(--surface2);border-radius:10px;padding:3px;gap:3px;margin-bottom:10px}
.type-btn{flex:1;border:none;border-radius:8px;padding:8px;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:var(--muted);transition:all .15s}
.type-btn.active{background:var(--surface);color:var(--text)}
.card{background:var(--surface);border-radius:var(--radius);border:1px solid #2a2a33;padding:16px;margin-bottom:10px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.card-name{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:1px}
.card-badge{font-size:10px;font-weight:600;letter-spacing:1px;color:var(--accent);background:rgba(200,241,53,.12);border-radius:6px;padding:3px 8px}
.card-meta{font-size:12px;color:var(--muted);margin-bottom:12px}
.card-btns{display:flex;gap:8px;flex-wrap:wrap}
.c-btn{flex:1;border-radius:10px;padding:9px 8px;font-size:13px;font-weight:600;cursor:pointer;border:none;text-align:center;transition:all .15s;min-width:0}
.c-btn.activate{background:var(--accent);color:#0d0d0f}
.c-btn.activated{background:var(--surface2);color:var(--muted);pointer-events:none}
.c-btn.edit{background:var(--surface2);color:var(--text);border:1px solid #3a3a45}
.c-btn.del{background:transparent;color:var(--danger);border:1px solid var(--danger);flex:0 0 44px}
.gex-item{background:var(--surface);border-radius:var(--radius);border:1px solid #2a2a33;padding:14px;margin-bottom:8px}
.gex-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;-webkit-user-select:none}
.gex-title{display:flex;align-items:center;gap:10px;font-weight:600;font-size:14px}
.gex-arrow{color:var(--muted);font-size:16px;transition:transform .2s}
.gex-item.open .gex-arrow{transform:rotate(90deg)}
.gex-body{display:none;margin-top:12px}
.gex-item.open .gex-body{display:block}
.del-btn{background:transparent;border:none;color:var(--danger);font-size:18px;cursor:pointer;padding:0 4px}
.phase-editor{border-radius:var(--radius);padding:14px;margin-bottom:8px;border:1px solid #2a2a33}
.phase-editor-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.phase-color-dot{width:12px;height:12px;border-radius:50%;display:inline-block;margin-right:6px;flex-shrink:0}

/* PLAN EXERCISE ROW - touch drag */
.plan-ex-row{background:var(--surface);border-radius:12px;border:1px solid #2a2a33;padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px;-webkit-user-select:none;user-select:none;transition:opacity .15s,border-color .15s}
.plan-ex-row.dragging{opacity:.4;border-color:var(--accent)}
.plan-ex-row.drag-over{border-color:var(--accent);border-style:dashed}
.drag-handle{color:var(--muted);font-size:20px;flex-shrink:0;padding:0 4px;touch-action:none;cursor:grab;line-height:1}
.plan-ex-info{flex:1;min-width:0}
.plan-ex-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.plan-ex-meta{font-size:11px;color:var(--muted)}
.plan-ex-btns{display:flex;gap:6px;flex-shrink:0}
.pe-btn{background:var(--surface2);border:1px solid #3a3a45;border-radius:8px;padding:5px 8px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text);white-space:nowrap}
.pe-btn.danger{color:var(--danger);border-color:var(--danger);background:transparent}
.pe-select{background:var(--surface2);border:1px solid #3a3a45;border-radius:8px;padding:5px 6px;font-size:11px;color:var(--text);max-width:85px;outline:none;-webkit-appearance:none}

/* ICON PICKER */
.icon-picker{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.ic-opt{font-size:22px;width:40px;height:40px;border-radius:10px;background:var(--surface2);display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.ic-opt.selected{border-color:var(--accent);background:rgba(200,241,53,.1)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;align-items:flex-end;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;margin-bottom:16px}
.modal-btns{display:flex;flex-direction:column;gap:8px;margin-top:16px}
.m-btn{background:var(--surface2);border:1px solid #3a3a45;border-radius:var(--radius);padding:14px 16px;font-size:15px;font-weight:600;cursor:pointer;color:var(--text);text-align:center}
.m-btn.accent{background:var(--accent);color:#0d0d0f;border-color:var(--accent)}
.m-btn.danger{color:var(--danger);border-color:var(--danger);background:transparent}
.m-cancel{color:var(--muted);font-size:14px;text-align:center;padding:10px;cursor:pointer}

/* HISTORY */
.h-card{background:var(--surface);border-radius:var(--radius);border:1px solid #2a2a33;padding:16px;margin-bottom:10px}
.h-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;margin-bottom:10px;color:var(--accent)}
.h-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #222;font-size:13px}
.h-row:last-child{border-bottom:none}
.h-val{color:var(--accent);font-weight:600}
.empty-state{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px}
.empty-state .big{font-size:44px;margin-bottom:12px}
.congrats{background:linear-gradient(135deg,#1a2e00,#2a4800);border:1px solid var(--done-border);border-radius:var(--radius);padding:22px;text-align:center;margin-bottom:14px}
.congrats .big{font-size:40px}
.congrats h2{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:var(--accent);margin:6px 0 3px}
.congrats p{font-size:12px;color:#a0c060}
.pc-0{background:rgba(200,241,53,.08);border-color:rgba(200,241,53,.25)}
.pc-1{background:rgba(100,180,255,.08);border-color:rgba(100,180,255,.25)}
.pc-2{background:rgba(255,150,100,.08);border-color:rgba(255,150,100,.25)}
.pc-3{background:rgba(200,100,255,.08);border-color:rgba(200,100,255,.25)}
.pc-4{background:rgba(100,220,180,.08);border-color:rgba(100,220,180,.25)}
.pt-0{color:#c8f135}.pt-1{color:#64b4ff}.pt-2{color:#ff9664}.pt-3{color:#c864ff}.pt-4{color:#64dcb4}
.pdot-0{background:#c8f135}.pdot-1{background:#64b4ff}.pdot-2{background:#ff9664}.pdot-3{background:#c864ff}.pdot-4{background:#64dcb4}
.stabs{display:flex;background:var(--surface2);border-radius:10px;padding:3px;gap:2px;margin-bottom:16px}
.stab{flex:1;border:none;border-radius:8px;padding:8px 4px;font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--muted);transition:all .15s;text-align:center}
.stab.active{background:var(--surface);color:var(--text)}
.sub-screen{display:none}
.sub-screen.active{display:block}
/* Export/Import */
.io-row{display:flex;gap:8px;margin-top:6px}
.io-btn{flex:1;background:var(--surface2);border:1px solid #3a3a45;border-radius:10px;padding:12px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text);text-align:center;display:flex;align-items:center;justify-content:center;gap:6px}
.io-btn:active{background:var(--surface3)}
/* Workout home */
.workout-home{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:20px;text-align:center;padding:20px}
.workout-home-icon{font-size:64px;margin-bottom:8px}
.workout-home-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--text)}
.workout-home-sub{font-size:14px;color:var(--muted);max-width:260px}
.workout-home .btn-primary{width:100%;max-width:300px;margin-top:0}
/* Plan select cards */
.plan-select-card{background:var(--surface);border-radius:var(--radius);border:1px solid #2a2a33;padding:16px;margin-bottom:10px;cursor:pointer;transition:border-color .15s,background .15s;-webkit-user-select:none}
.plan-select-card:active{border-color:var(--accent);background:rgba(200,241,53,.05)}
.plan-select-card.selected{border-color:var(--accent);background:rgba(200,241,53,.07)}
.psc-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;margin-bottom:4px}
.psc-meta{font-size:12px;color:var(--muted)}
/* History detail */
.h-card{cursor:pointer;transition:border-color .15s}
.h-card:active{border-color:var(--accent)}
.h-card-arrow{color:var(--muted);font-size:18px;float:right;margin-top:-2px}
.hd-ex-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #222}
.hd-ex-row:last-child{border-bottom:none}
.hd-ex-icon{font-size:18px;width:30px;flex-shrink:0}
.hd-ex-info{flex:1;min-width:0}
.hd-ex-name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hd-ex-meta{font-size:11px;color:var(--muted);margin-top:1px}
.hd-ex-status{font-size:18px;flex-shrink:0}
/* Active workout banner */
.workout-active-banner{background:linear-gradient(135deg,rgba(200,241,53,.12),rgba(139,187,26,.08));border:1.5px solid var(--accent);border-radius:var(--radius);padding:16px;margin-bottom:14px;display:flex;align-items:center;gap:14px}
.wab-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);flex-shrink:0;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
.wab-info{flex:1;min-width:0}
.wab-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--accent)}
.wab-sub{font-size:12px;color:var(--muted);margin-top:1px}
.wab-btn{background:var(--accent);color:#0d0d0f;border:none;border-radius:10px;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;padding:9px 14px;cursor:pointer;flex-shrink:0}
/* Finish workout */
.finish-workout-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0d0d0f;border:none;border-radius:var(--radius);font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;padding:18px 20px;width:100%;cursor:pointer;margin-top:16px;display:flex;align-items:center;justify-content:center;gap:10px}
.finish-workout-btn:active{opacity:.85}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div><h1 id="h-plan-name">GYMAPP</h1><p id="h-sub">fair fitness</p></div>
    <div class="prw">
      <svg width="46" height="46" viewBox="0 0 46 46">
        <circle class="pr-bg" cx="23" cy="23" r="19"/>
        <circle class="pr-bar" id="prBar" cx="23" cy="23" r="19" stroke-dasharray="119.38" stroke-dashoffset="119.38"/>
      </svg>
      <div class="pr-txt" id="prTxt">0%</div>
    </div>
  </div>
</div>

<div id="screen-workout" class="screen active"><div id="workout-content"></div></div>

<div id="screen-detail" class="screen">
  <div class="detail-header">
    <button class="back-btn" onclick="goBack()">‹</button>
    <div style="flex:1;min-width:0"><div class="detail-title" id="d-name"></div><div class="detail-sub" id="d-muscle"></div></div>
    <button class="back-btn" id="d-abort-btn" onclick="abortWorkout()" style="background:transparent;border-color:#3a3a45;color:var(--danger);font-size:13px;font-weight:600;width:auto;padding:0 10px;white-space:nowrap">✕ Stop</button>
  </div>
  <div class="info-grid" id="d-info"></div>
  <div class="note-box" id="d-note" style="display:none"></div>
  <div class="sec-label" id="lbl-sets-timer">SÄTZE / TIMER</div>
  <div id="d-sets"></div>
  <button class="btn-primary" id="d-done-btn" onclick="markExDone()"></button>
  <button class="btn-secondary" id="d-undo-btn" onclick="undoExDone()" style="display:none"></button>
</div>

<div id="screen-settings" class="screen">
  <div class="stabs" id="settings-stabs">
    <button class="stab active" onclick="showSettingsTab('plans')" data-i="tab.plans"></button>
    <button class="stab" onclick="showSettingsTab('globalex')" data-i="tab.exercises"></button>
    <button class="stab" onclick="showSettingsTab('general')" data-i="tab.general"></button>
  </div>
  <div id="stab-plans" class="sub-screen active">
    <div id="plans-list"></div>
    <button class="btn-outline" id="btn-new-plan" onclick="openModal('modalAddPlan')"></button>
  </div>
  <div id="stab-globalex" class="sub-screen">
    <p style="font-size:13px;color:var(--muted);margin-bottom:14px" id="gex-desc"></p>
    <div id="gex-list"></div>
    <button class="btn-outline" id="btn-new-gex" onclick="openAddGex()"></button>
  </div>
  <div id="stab-general" class="sub-screen">
    <div class="sec-label" data-i="section.general"></div>
    <div class="card">
      <div class="g-row">
        <div><div class="g-lbl" data-i="gs.pause.lbl"></div><div class="g-sub" data-i="gs.pause.sub"></div></div>
        <input class="g-val" id="gs-pause" type="number" min="10" max="300" onblur="saveGlobal('pauseSecs',this.value)">
      </div>
      <div class="g-row">
        <div><div class="g-lbl" data-i="gs.trainer.lbl"></div><div class="g-sub" data-i="gs.trainer.sub"></div></div>
        <input class="g-val wide" id="gs-trainer" type="text" onblur="saveGlobal('trainer',this.value)">
      </div>
      <div class="g-row">
        <div><div class="g-lbl" data-i="gs.lang.lbl"></div><div class="g-sub" data-i="gs.lang.sub"></div></div>
        <select class="g-val wide" id="gs-lang" onchange="changeLang(this.value)">
          <option value="de">🇩🇪 Deutsch</option>
          <option value="en">🇬🇧 English</option>
        </select>
      </div>
    </div>
    <div class="sec-label" data-i="section.data"></div>
    <div class="card" style="padding:12px 16px">
      <div class="io-row">
        <div class="io-btn" id="btn-export" onclick="exportData()"><span>📤</span><span data-i="btn.export"></span></div>
        <div class="io-btn" id="btn-import" onclick="triggerImport()"><span>📥</span><span data-i="btn.import"></span></div>
      </div>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
    </div>
    <div class="sec-label" data-i="section.workout"></div>
    <div class="card" style="padding:12px 16px">
      <button class="btn-outline" id="btn-new-workout" onclick="newWorkout()"></button>
      <button class="btn-danger" id="btn-reset-all" onclick="confirmResetAll()"></button>
    </div>
  </div>
</div>

<div id="screen-plan-detail" class="screen">
  <div class="detail-header">
    <button class="back-btn" onclick="showScreen('settings');showSettingsTab('plans')">‹</button>
    <div style="flex:1;min-width:0"><div class="detail-title" id="pd-name"></div><div class="detail-sub" id="pd-meta"></div></div>
  </div>
  <div class="stabs">
    <button class="stab active" onclick="showPlanTab('phases')" data-i="tab.phases"></button>
    <button class="stab" onclick="showPlanTab('exercises')" data-i="tab.exercises"></button>
  </div>
  <div id="ptab-phases" class="sub-screen active"></div>
  <div id="ptab-exercises" class="sub-screen"></div>
</div>

<div id="screen-history" class="screen"><div id="history-content"></div></div>

<!-- HISTORY DETAIL SCREEN -->
<div id="screen-history-detail" class="screen">
  <div class="detail-header">
    <button class="back-btn" onclick="showScreen('history')">‹</button>
    <div style="flex:1;min-width:0"><div class="detail-title" id="hd-title"></div><div class="detail-sub" id="hd-sub"></div></div>
  </div>
  <div class="info-grid" id="hd-info"></div>
  <div class="sec-label" id="hd-ex-label"></div>
  <div id="hd-exercises"></div>
</div>

<!-- MODAL: SELECT PLAN TO START -->
<div class="modal-overlay" id="modalSelectPlan">
  <div class="modal">
    <div class="modal-title" id="msp-title"></div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:16px" id="msp-sub"></p>
    <div id="plan-select-list"></div>
    <div class="m-cancel" onclick="closeModal('modalSelectPlan')" data-i="btn.cancel"></div>
  </div>
</div>

<!-- PAUSE TIMER -->
<div class="timer-overlay" id="timerOverlay">
  <div class="tov-lbl" id="tov-lbl"></div>
  <div class="tov-circle">
    <svg viewBox="0 0 180 180">
      <circle class="tov-bg" cx="90" cy="90" r="80"/>
      <circle class="tov-bar" id="tovBar" cx="90" cy="90" r="80" stroke-dasharray="502.65" stroke-dashoffset="0"/>
    </svg>
    <div class="tov-num" id="tovNum">75</div>
  </div>
  <div class="tov-next" id="tovNext"></div>
  <button class="tov-skip" id="tov-skip" onclick="skipTimer()"></button>
</div>

<!-- MODAL: ADD PLAN -->
<div class="modal-overlay" id="modalAddPlan">
  <div class="modal">
    <div class="modal-title" data-i="modal.newplan"></div>
    <div class="s-row"><div class="s-lbl" data-i="field.planname"></div><input class="s-inp" id="newPlanName" type="text"></div>
    <div class="modal-btns">
      <div class="m-btn accent" id="btn-plan-empty" onclick="createPlan('empty')"></div>
      <div class="m-btn" id="btn-plan-copy" onclick="createPlan('copy')"></div>
    </div>
    <div class="m-cancel" onclick="closeModal('modalAddPlan')" data-i="btn.cancel"></div>
  </div>
</div>

<!-- MODAL: GLOBAL EXERCISE -->
<div class="modal-overlay" id="modalAddGex">
  <div class="modal">
    <div class="modal-title" id="mgex-title"></div>
    <div class="s-row"><div class="s-lbl" data-i="field.icon"></div><div class="icon-picker" id="iconPickerGex"></div></div>
    <div class="s-row"><div class="s-lbl" data-i="field.type"></div>
      <div class="type-toggle">
        <button class="type-btn active" id="tt-reps" onclick="setGexType('reps')" data-i="type.reps"></button>
        <button class="type-btn" id="tt-time" onclick="setGexType('time')" data-i="type.time"></button>
      </div>
    </div>
    <div class="s-row-2">
      <div class="s-row"><div class="s-lbl" data-i="field.muscle"></div><input class="s-inp" id="gex-muscle" type="text"></div>
      <div class="s-row"><div class="s-lbl" data-i="field.name"></div><input class="s-inp" id="gex-name" type="text"></div>
    </div>
    <div id="gex-reps-fields">
      <div class="s-row-2">
        <div class="s-row"><div class="s-lbl" data-i="field.reps"></div><input class="s-inp" id="gex-reps" type="text" placeholder="8-12"></div>
        <div class="s-row"><div class="s-lbl" data-i="field.sets"></div><input class="s-inp" id="gex-sets" type="number" min="1" max="20" placeholder="3"></div>
      </div>
      <div class="s-row-2">
        <div class="s-row"><div class="s-lbl" data-i="field.seatheight"></div><input class="s-inp" id="gex-sitz" type="text"></div>
        <div class="s-row"><div class="s-lbl" data-i="field.weight"></div><input class="s-inp" id="gex-kg" type="text"></div>
      </div>
      <div class="s-row"><div class="s-lbl" data-i="field.pause"></div><input class="s-inp" id="gex-pause" type="number"></div>
    </div>
    <div id="gex-time-fields" style="display:none">
      <div class="s-row"><div class="s-lbl" data-i="field.duration"></div><input class="s-inp" id="gex-dur" type="text" placeholder="5-10"></div>
    </div>
    <div class="s-row"><div class="s-lbl" data-i="field.note"></div><input class="s-inp" id="gex-note" type="text"></div>
    <div class="modal-btns"><div class="m-btn accent" id="mgex-save-btn" onclick="saveGex()"></div></div>
    <div class="m-cancel" onclick="closeModal('modalAddGex')" data-i="btn.cancel"></div>
  </div>
</div>

<!-- MODAL: ADD EXERCISE TO PLAN -->
<div class="modal-overlay" id="modalAddPlanEx">
  <div class="modal">
    <div class="modal-title" data-i="modal.addex"></div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:14px" id="planex-desc"></p>
    <div id="gex-pick-list"></div>
    <div style="border-top:1px solid #2a2a33;margin:12px 0"></div>
    <div class="m-btn" id="btn-custom-ex" onclick="openAddCustomEx()"></div>
    <div class="m-cancel" onclick="closeModal('modalAddPlanEx')" data-i="btn.cancel"></div>
  </div>
</div>

<!-- MODAL: CUSTOMIZE PLAN EXERCISE -->
<div class="modal-overlay" id="modalCustomizeEx">
  <div class="modal">
    <div class="modal-title" id="mce-title"></div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:14px" id="mce-desc"></p>
    <div class="s-row"><div class="s-lbl" data-i="field.icon"></div><div class="icon-picker" id="iconPickerPlanEx"></div></div>
    <div id="mce-fields"></div>
    <div class="modal-btns"><div class="m-btn accent" id="mce-save-btn" onclick="savePlanEx()"></div></div>
    <div class="m-cancel" onclick="closeModal('modalCustomizeEx')" data-i="btn.cancel"></div>
  </div>
</div>

<!-- MODAL: RENAME PLAN -->
<div class="modal-overlay" id="modalRenamePlan">
  <div class="modal">
    <div class="modal-title" data-i="modal.editplan"></div>
    <div class="s-row"><div class="s-lbl" data-i="field.name"></div><input class="s-inp" id="renamePlanInput" type="text"></div>
    <div class="modal-btns">
      <div class="m-btn accent" onclick="confirmRenamePlan()" data-i="btn.save"></div>
      <div class="m-btn danger" onclick="deletePlanModal()" data-i="btn.deleteplan"></div>
    </div>
    <div class="m-cancel" onclick="closeModal('modalRenamePlan')" data-i="btn.cancel"></div>
  </div>
</div>

<!-- MODAL: ADD PHASE -->
<div class="modal-overlay" id="modalAddPhase">
  <div class="modal">
    <div class="modal-title" data-i="modal.addphase"></div>
    <div class="s-row"><div class="s-lbl" data-i="field.name"></div><input class="s-inp" id="newPhaseName" type="text"></div>
    <div class="modal-btns"><div class="m-btn accent" onclick="addPhase()" data-i="btn.add"></div></div>
    <div class="m-cancel" onclick="closeModal('modalAddPhase')" data-i="btn.cancel"></div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" id="nav-workout" onclick="showScreen('workout')"><span>🏋️</span><span data-i="nav.workout"></span></button>
  <button class="nav-btn" id="nav-settings" onclick="showScreen('settings')"><span>⚙️</span><span data-i="nav.settings"></span></button>
  <button class="nav-btn" id="nav-history" onclick="showScreen('history')"><span>📋</span><span data-i="nav.history"></span></button>
</div>

// HELPERS
// ══════════════════════════════════════════════
function activePlan(){ return state.plans.find(p=>p.id===state.activePlanId)||state.plans[0]; }
function getPlanById(id){ return state.plans.find(p=>p.id===id); }
function getEx(exId){ return activePlan().exercises.find(e=>e.id===exId); }
function getProg(planId){ if(!state.progress[planId]) state.progress[planId]={completedSets:{},doneExercises:[]}; return state.progress[planId]; }
function getSets(exId){ return getProg(state.activePlanId).completedSets[exId]||0; }
function setSets(exId,n){ getProg(state.activePlanId).completedSets[exId]=n; }
function isDone(exId){ return getProg(state.activePlanId).doneExercises.includes(exId); }
function setDone(exId){ const p=getProg(state.activePlanId); if(!p.doneExercises.includes(exId)) p.doneExercises.push(exId); }
function unsetDone(exId){ const p=getProg(state.activePlanId); p.doneExercises=p.doneExercises.filter(x=>x!==exId); }
function pauseFor(ex){ return (ex.pauseSecs!=null&&ex.pauseSecs!=='')? parseInt(ex.pauseSecs):state.globalPauseSecs; }
function fmtTime(s){ return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }
function metaStr(ex){
  if(ex.type==='time') return (ex.durationMin||'5-10')+' '+t('min.abbr');
  const p=[]; if(ex.reps) p.push(ex.reps+' '+t('reps.abbr')); p.push(ex.sets+' '+t('field.sets'));
  if(ex.sithoehe) p.push(t('seatheight.abbr')+' '+ex.sithoehe); if(ex.kg) p.push(ex.kg+' kg');
  return p.join(' · ');
}

  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));

}

// ══════════════════════════════════════════════
// WORKOUT HOME vs ACTIVE
// ══════════════════════════════════════════════

function renderWorkout(){
  updateHeader();
  if(workoutMode === 'home') renderWorkoutHome();
  else renderWorkoutActive();
}

function renderWorkoutHome(){
  // Check if there's an active workout in progress (has any progress)
  const prog = getProg(state.activePlanId);
  const hasProgress = prog.doneExercises.length > 0 || Object.values(prog.completedSets).some(v=>v>0);
  const plan = activePlan();
  const done = prog.doneExercises.length, total = plan.exercises.length;
  const pct = total ? Math.round(done/total*100) : 0;

  let bannerHTML = '';
  if(hasProgress){
    bannerHTML = `<div class="workout-active-banner" onclick="startWithPlan('${state.activePlanId}')">
      <div class="wab-dot"></div>
      <div class="wab-info">
        <div class="wab-title">${plan.name.toUpperCase()}</div>
        <div class="wab-sub">${t('workout.active.banner.sub')} · ${done}/${total} · ${pct}%</div>
      </div>
      <button class="wab-btn" onclick="event.stopPropagation();startWithPlan('${state.activePlanId}')">${t('workout.active.resume')}</button>
    </div>`;
  }

  document.getElementById('workout-content').innerHTML=`
    ${bannerHTML}
    <div class="workout-home">
      <div>
        <div class="workout-home-icon">🏋️</div>
        <div class="workout-home-title">${t('workout.home.title')}</div>
        <div class="workout-home-sub" style="margin:8px auto 0">${t('workout.home.sub')}</div>
      </div>
      <button class="btn-primary" style="max-width:300px" onclick="openPlanSelectModal()">${hasProgress ? t('workout.end.new') : t('workout.start')}</button>
    </div>`;
  updateProgress();
}

function renderWorkoutActive(){
  const plan=activePlan();
  setWorkoutHeader(plan.name); // Show plan name in header while workout is active
  let h=`<div style="display:flex;justify-content:flex-end;margin-bottom:8px">
    <button onclick="abortWorkout()" style="background:transparent;border:1px solid var(--danger);color:var(--danger);border-radius:10px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer">✕ ${t('workout.abort')}</button>
  </div>`;
  plan.phases.forEach((phase,pi)=>{
    const exs=plan.exercises.filter(e=>e.phaseId===phase.id); if(!exs.length) return;
    h+=`<div class="phase-card pc-${pi%PHASE_COLORS}"><div class="phase-label pt-${pi%PHASE_COLORS}">${t('phase')} ${pi+1}</div><div class="phase-title">${phase.name}</div></div>`;
    exs.forEach(ex=>{ h+=exItemHTML(ex); });
  });
  const unphased=plan.exercises.filter(e=>!e.phaseId||!plan.phases.find(ph=>ph.id===e.phaseId));
  if(unphased.length){
    h+=`<div class="phase-card" style="background:var(--surface)"><div class="phase-label">${t('without-phase-lbl')}</div><div class="phase-title">${t('without-phase')}</div></div>`;
    unphased.forEach(ex=>{ h+=exItemHTML(ex); });
  }
  h+=`<button class="finish-workout-btn" onclick="finishWorkout()">🏁 ${t('workout.finish')}</button>`;
  document.getElementById('workout-content').innerHTML=h;
  updateProgress();
}

function abortWorkout(){
  if(!confirm(t('workout.abort.confirm'))) return;
  // Discard progress, no history entry
  state.progress[state.activePlanId]={completedSets:{},doneExercises:[]};
  saveState();
  clearInterval(wuInt); wuRunning=false; swStopAll(); clearInterval(pauseInt);
  document.getElementById('timerOverlay').classList.remove('active');
  workoutMode='home';
  renderWorkout();
  window.scrollTo(0,0);
}

function startWithPlan(planId){
  closeModal('modalSelectPlan');
  state.activePlanId = planId; saveState();
  workoutMode = 'active';
  renderWorkoutActive();
  updateProgress();
}

function finishWorkout(){
  if(!confirm(t('workout.end.confirm'))) return;
  saveHistory();
  // Reset progress for this plan
  state.progress[state.activePlanId]={completedSets:{},doneExercises:[]};
  saveState();
  clearInterval(wuInt); wuRunning=false; swStopAll();
  workoutMode='home';
  renderWorkout();
  window.scrollTo(0,0);
}

function openPlanSelectModal(){
  document.getElementById('msp-title').textContent = t('workout.select.title');
  document.getElementById('msp-sub').textContent = t('workout.select.sub');
  const list = document.getElementById('plan-select-list');
  list.innerHTML = state.plans.map(p=>{
    const prog = getProg(p.id);
    const hasProgress = prog.doneExercises.length > 0 || Object.values(prog.completedSets).some(v=>v>0);
    const done = prog.doneExercises.length, total = p.exercises.length;
    const pct = total ? Math.round(done/total*100) : 0;
    const isCurrentActive = workoutMode==='active' && p.id===state.activePlanId;
    return `<div class="plan-select-card ${isCurrentActive?'selected':''}" onclick="startWithPlan('${p.id}')">
      <div class="psc-name">${isCurrentActive?'▶ ':''} ${p.name}</div>
      <div class="psc-meta">${p.phases.length} ${t('phases')} · ${total} ${t('exercises')}${hasProgress?' · '+pct+'% '+t('done').replace('✓ ',''):''}</div>
    </div>`;
  }).join('');
  openModal('modalSelectPlan');
}

function startWithPlan(planId){
  closeModal('modalSelectPlan');
  state.activePlanId = planId; saveState();
  workoutMode = 'active';
  renderWorkoutActive();
  updateProgress();
}

function exItemHTML(ex){
  const done=isDone(ex.id), ds=getSets(ex.id);
  let dots='';
  if(ex.type==='reps') for(let i=0;i<ex.sets;i++) dots+=`<div class="dot ${i<ds?'done':''}"></div>`;
  return `<div class="exercise-item ${done?'done':''}" onclick="openDetail('${ex.id}')">
    <div class="ex-icon">${ex.icon}</div>
    <div class="ex-info"><div class="ex-muscle">${ex.muscle}</div><div class="ex-name">${ex.name}</div><div class="ex-meta">${metaStr(ex)}</div>${ex.type==='reps'?`<div class="ex-dots">${dots}</div>`:''}</div>
    <div class="ex-arrow">${done?'✓':'›'}</div>
  </div>`;
}

function updateProgress(){
  const plan=activePlan(), total=plan.exercises.length, done=getProg(state.activePlanId).doneExercises.length;
  const pct=total?Math.round(done/total*100):0, circ=119.38;
  document.getElementById('prBar').style.strokeDashoffset=circ-(circ*pct/100);
  document.getElementById('prTxt').textContent=pct+'%';
}

let currentExId=null;
function openDetail(exId){
  currentExId=exId; const ex=getEx(exId);
  document.getElementById('d-name').textContent=ex.name;
  document.getElementById('d-muscle').textContent=ex.muscle+' – '+(ex.type==='time'?t('time-ex'):t('strength-ex'));
  const grid=document.getElementById('d-info');
  if(ex.type==='time'){
    grid.innerHTML=`<div class="info-box" style="grid-column:1/-1"><div class="ib-label">${t('field.duration')}</div><div class="ib-val">${ex.durationMin||'5-10'}</div><div class="ib-sub">${t('min.abbr')}</div></div>`;
  } else {
    let h=`<div class="info-box"><div class="ib-label">${t('field.reps')}</div><div class="ib-val">${ex.reps||'–'}</div><div class="ib-sub">${t('reps.abbr')}</div></div>
      <div class="info-box"><div class="ib-label">${t('field.sets')}</div><div class="ib-val">${ex.sets}</div><div class="ib-sub">${t('field.sets').toLowerCase()}</div></div>`;
    if(ex.sithoehe) h+=`<div class="info-box"><div class="ib-label">${t('field.seatheight')}</div><div class="ib-val">${ex.sithoehe}</div><div class="ib-sub">${t('seatheight.abbr')}</div></div>`;
    if(ex.kg) h+=`<div class="info-box"><div class="ib-label">${t('field.weight')}</div><div class="ib-val">${ex.kg}</div><div class="ib-sub">kg</div></div>`;
    h+=`<div class="info-box"><div class="ib-label">${t('gs.pause.lbl')}</div><div class="ib-val">${pauseFor(ex)}</div><div class="ib-sub">sek.</div></div>`;
    grid.innerHTML=h;
  }
  const noteEl=document.getElementById('d-note');
  if(ex.note){noteEl.textContent='⚙️  '+ex.note;noteEl.style.display='block';}else noteEl.style.display='none';
  renderSetRows(ex);
  const btn=document.getElementById('d-done-btn'), undo=document.getElementById('d-undo-btn');
  if(isDone(exId)){btn.textContent=t('done');btn.disabled=true;undo.style.display='block';}
  else{btn.textContent=t('complete');btn.disabled=false;undo.style.display='none';}
  // Keep workout header while inside an exercise
  setWorkoutHeader(activePlan().name);
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-detail').classList.add('active');
}

function goBack(){
  clearInterval(wuInt);wuRunning=false;swStopAll();
  workoutMode='active';
  showScreen('workout');
  setWorkoutHeader(activePlan().name);
}

function renderSetRows(ex){
  const cont=document.getElementById('d-sets'), done=getSets(ex.id);
  if(ex.type==='time'){
    const durMins=parseInt((ex.durationMin||'5').split('-')[0])||5, durSecs=durMins*60, d=isDone(ex.id);
    cont.innerHTML=`<div class="ex-timer">
      <div class="et-lbl">${t('timer')}</div>
      <div class="et-disp" id="et-disp">${fmtTime(durSecs)}</div>
      <div class="et-bar-wrap"><div class="et-bar" id="et-bar"></div></div>
      <div class="et-btns">
        <button class="et-btn start" id="et-btn" onclick="etToggle(${durSecs})">▶ START</button>
        <button class="et-btn reset" onclick="etReset(${durSecs})">↺</button>
      </div></div>
      <div class="set-row ${d?'done-row':''}" onclick="completeTimeEx()">
        <div class="sr-left"><div class="sr-num">✓</div><div><div class="sr-label">${ex.durationMin||'5-10'} ${t('completed.min')}</div></div></div>
        <div class="chk">${d?'✓':'○'}</div>
      </div>`;
    return;
  }
  let h='';
  for(let i=1;i<=ex.sets;i++){
    const iDone=i<=done, isNext=i===done+1, isLocked=i>done+1;
    const kg=ex.kg?`<span class="wbadge">${ex.kg} kg</span>`:'';
    h+=`<div class="set-row ${iDone?'done-row':''} ${isLocked?'locked':''}" id="sr-${ex.id}-${i}">
      <div class="sr-left" style="cursor:${isLocked?'default':'pointer'}">
        <div class="sr-num">${i}</div>
        <div><div class="sr-label">${t('set')} ${i} · ${ex.reps||'–'} ${t('reps.abbr')}${kg}</div>
          ${ex.sithoehe?`<div class="sr-sub">${t('seatheight.abbr')} ${ex.sithoehe}</div>`:''}
          ${!iDone?`<div class="sw-wrap">
            <span class="sw-time" id="sw-t-${ex.id}-${i}">0:00</span>
            <button class="sw-btn" id="sw-b-${ex.id}-${i}" onclick="event.stopPropagation();swToggle('${ex.id}',${i})">▶ Start</button>
            <button class="sw-btn" onclick="event.stopPropagation();swReset('${ex.id}',${i})">↺</button>
          </div>`:`<div class="sr-sub" style="color:var(--done-border)">✓ ${t('done').replace('✓ ','')}</div>`}
        </div>
      </div>
      <div class="chk" style="cursor:${isLocked?'default':'pointer'}">${iDone?'✓':(isNext?'▶':'○')}</div>
    </div>`;
  }
  cont.innerHTML=h;
  for(let i=1;i<=ex.sets;i++){
    const iDone=i<=done, isLocked=i>done+1;
    if(!isLocked&&!iDone){
      const row=document.getElementById('sr-'+ex.id+'-'+i); if(!row) continue;
      const ii=i;
      row.querySelector('.sr-left').onclick=()=>completeSet(ex.id,ii);
      row.querySelector('.chk').onclick=()=>completeSet(ex.id,ii);
    }
  }
}

function completeTimeEx(){ if(isDone(currentExId))return; setDone(currentExId);setSets(currentExId,1);saveState();updateProgress();openDetail(currentExId); }
function completeSet(exId,setNum){
  if(setNum!==getSets(exId)+1)return;
  swStopAll(); setSets(exId,setNum); saveState();
  const ex=getEx(exId);
  for(let i=1;i<=ex.sets;i++){
    const row=document.getElementById('sr-'+exId+'-'+i); if(!row) continue;
    const iDone=i<=setNum, isNext=i===setNum+1, isLocked=i>setNum+1;
    row.className='set-row'+(iDone?' done-row':'')+(isLocked?' locked':'');
    row.querySelector('.chk').textContent=iDone?'✓':(isNext?'▶':'○');
    if(!isLocked&&!iDone){ const ii=i; row.querySelector('.sr-left').onclick=()=>completeSet(exId,ii); row.querySelector('.chk').onclick=()=>completeSet(exId,ii); }
  }
  updateProgress();
  if(setNum<ex.sets){ document.getElementById('tovNext').innerHTML=`${t('set')} <strong>${setNum+1}/${ex.sets}</strong>`; startPauseTimer(pauseFor(ex)); }
}
function markExDone(){ setDone(currentExId);saveState();updateProgress();openDetail(currentExId); }
function undoExDone(){ unsetDone(currentExId);setSets(currentExId,0);saveState();updateProgress();openDetail(currentExId); }

let wuInt=null,wuRem=0,wuTot=0,wuRunning=false;
function etToggle(total){
  if(!wuRunning){
    if(wuRem<=0)wuRem=total; wuTot=total; wuRunning=true;
    const btn=document.getElementById('et-btn'),disp=document.getElementById('et-disp'),bar=document.getElementById('et-bar');
    if(btn){btn.textContent='⏸ PAUSE';btn.className='et-btn stop';}
    if(disp)disp.className='et-disp running'; if(bar)bar.className='et-bar running';
    wuInt=setInterval(()=>{
      wuRem--;
      const d=document.getElementById('et-disp'),b=document.getElementById('et-bar');
      if(d)d.textContent=fmtTime(Math.max(0,wuRem));
      if(b)b.style.width=Math.max(0,wuRem/wuTot*100)+'%';
      if(wuRem<=0){ clearInterval(wuInt);wuRunning=false;
        if(d){d.textContent='FERTIG!';d.className='et-disp finished';}
        if(b)b.className='et-bar finished';
        const sb=document.getElementById('et-btn'); if(sb){sb.textContent='▶ NOCHMAL';sb.className='et-btn start';}
      }
    },1000);
  } else {
    clearInterval(wuInt);wuRunning=false;
    const btn=document.getElementById('et-btn'),disp=document.getElementById('et-disp');
    if(btn){btn.textContent='▶ WEITER';btn.className='et-btn start';} if(disp)disp.className='et-disp';
  }
}
function etReset(total){ clearInterval(wuInt);wuRunning=false;wuRem=total;wuTot=total;
  const d=document.getElementById('et-disp'),b=document.getElementById('et-bar'),btn=document.getElementById('et-btn');
  if(d){d.textContent=fmtTime(total);d.className='et-disp';} if(b){b.style.width='100%';b.className='et-bar';}
  if(btn){btn.textContent='▶ START';btn.className='et-btn start';}
}
let swInts={},swSecs={},swRun={};
function swKey(e,i){return e+'-'+i;}
function swToggle(exId,i){ const k=swKey(exId,i);
  if(!swRun[k]){ swRun[k]=true; if(!swSecs[k])swSecs[k]=0;
    const btn=document.getElementById('sw-b-'+k); if(btn){btn.textContent='⏸ Stop';btn.className='sw-btn active';}
    swInts[k]=setInterval(()=>{swSecs[k]++;const el=document.getElementById('sw-t-'+k);if(el)el.textContent=fmtTime(swSecs[k]);},1000);
  } else { swRun[k]=false;clearInterval(swInts[k]); const btn=document.getElementById('sw-b-'+k); if(btn){btn.textContent='▶ Start';btn.className='sw-btn';} }
}
function swReset(exId,i){ const k=swKey(exId,i);clearInterval(swInts[k]);swRun[k]=false;swSecs[k]=0;
  const el=document.getElementById('sw-t-'+k),btn=document.getElementById('sw-b-'+k);
  if(el)el.textContent='0:00'; if(btn){btn.textContent='▶ Start';btn.className='sw-btn';}
}
function swStopAll(){ Object.keys(swInts).forEach(k=>{clearInterval(swInts[k]);swRun[k]=false;}); }
let pauseInt=null;
function startPauseTimer(secs){ clearInterval(pauseInt);let rem=secs;const circ=502.65;
  const ov=document.getElementById('timerOverlay'),bar=document.getElementById('tovBar'),num=document.getElementById('tovNum');
  ov.classList.add('active');num.textContent=rem;bar.style.strokeDashoffset=0;
  pauseInt=setInterval(()=>{rem--;num.textContent=rem;bar.style.strokeDashoffset=circ*(1-rem/secs);if(rem<=0){clearInterval(pauseInt);ov.classList.remove('active');}},1000);
}
function skipTimer(){ clearInterval(pauseInt);document.getElementById('timerOverlay').classList.remove('active'); }

// Mouse drag (desktop)
function mouseDragStart(e,id){
  dragSrcId=id;
  document.addEventListener('mousemove',mouseDragMove);
  document.addEventListener('mouseup',mouseDragEnd);
  document.getElementById('per-'+id)?.classList.add('dragging');
}
function mouseDragMove(e){
  if(!dragSrcId)return;
  const el=document.elementFromPoint(e.clientX,e.clientY);
  const row=el?.closest('.plan-ex-row');
  document.querySelectorAll('.plan-ex-row').forEach(r=>r.classList.remove('drag-over'));
  if(row&&row.id!=='per-'+dragSrcId){ row.classList.add('drag-over'); touchDragTargetId=row.id.replace('per-',''); }
  else touchDragTargetId=null;
}
function mouseDragEnd(){
  document.removeEventListener('mousemove',mouseDragMove);
  document.removeEventListener('mouseup',mouseDragEnd);
  if(dragSrcId&&touchDragTargetId) doReorder(dragSrcId,touchDragTargetId);
  document.querySelectorAll('.plan-ex-row').forEach(r=>r.classList.remove('dragging','drag-over'));
  dragSrcId=null; touchDragTargetId=null;
}

// Touch drag (mobile)
function touchDragStart(e,id){
  e.preventDefault();
  dragSrcId=id; touchDragStartY=e.touches[0].clientY;
  const row=document.getElementById('per-'+id); if(!row) return;
  row.classList.add('dragging');
  document.addEventListener('touchmove',touchDragMove,{passive:false});
  document.addEventListener('touchend',touchDragEnd);
}
function touchDragMove(e){
  e.preventDefault(); if(!dragSrcId) return;
  const touch=e.touches[0];
  const el=document.elementFromPoint(touch.clientX,touch.clientY);
  const row=el?.closest('.plan-ex-row');
  document.querySelectorAll('.plan-ex-row').forEach(r=>r.classList.remove('drag-over'));
  if(row&&row.id!=='per-'+dragSrcId){ row.classList.add('drag-over'); touchDragTargetId=row.id.replace('per-',''); }
  else touchDragTargetId=null;
}
function touchDragEnd(){
  document.removeEventListener('touchmove',touchDragMove);
  document.removeEventListener('touchend',touchDragEnd);
  if(dragSrcId&&touchDragTargetId) doReorder(dragSrcId,touchDragTargetId);
  document.querySelectorAll('.plan-ex-row').forEach(r=>r.classList.remove('dragging','drag-over'));
  dragSrcId=null; touchDragTargetId=null;
}
function doReorder(srcId,tgtId){
  const plan=getPlanById(editingPlanId), exs=plan.exercises;
  const si=exs.findIndex(e=>e.id===srcId), ti=exs.findIndex(e=>e.id===tgtId);
  if(si<0||ti<0) return;
  const [moved]=exs.splice(si,1); exs.splice(ti,0,moved);
  saveState(); renderPlanExercises();
}

    <div id="mce-reps-fields" style="${curType==='time'?'display:none':''}">
      <div class="s-row-2">
        <div class="s-row"><div class="s-lbl">${t('field.reps')}</div><input class="s-inp" id="mce-reps" value="${data.reps||''}"></div>
        <div class="s-row"><div class="s-lbl">${t('field.sets')}</div><input class="s-inp" id="mce-sets" type="number" min="1" value="${data.sets||3}"></div>
      </div>
      <div class="s-row-2">
        <div class="s-row"><div class="s-lbl">${t('field.seatheight')}</div><input class="s-inp" id="mce-sitz" value="${data.sithoehe||''}"></div>
        <div class="s-row"><div class="s-lbl">${t('field.weight')}</div><input class="s-inp" id="mce-kg" value="${data.kg||''}"></div>
      </div>
      <div class="s-row"><div class="s-lbl">${t('field.pause')}</div><input class="s-inp" id="mce-pause" type="number" placeholder="${state.globalPauseSecs}" value="${data.pauseSecs!=null?data.pauseSecs:''}"></div>
    </div>
    <div id="mce-time-fields" style="${curType==='time'?'':'display:none'}">
      <div class="s-row"><div class="s-lbl">${t('field.duration')}</div><input class="s-inp" id="mce-dur" value="${data.durationMin||'5-10'}"></div>
    </div>
    <div class="s-row"><div class="s-lbl">${t('field.note')}</div><input class="s-inp" id="mce-note" value="${data.note||''}"></div>
    <div class="s-row"><div class="s-lbl">${t('field.phase')}</div><select class="s-inp" id="mce-phase">${phaseOpts}</select></div>`;
  openModal('modalCustomizeEx');
}

function mcetToggle(type){
  document.getElementById('mce-tt-reps').className='type-btn'+(type==='reps'?' active':'');
  document.getElementById('mce-tt-time').className='type-btn'+(type==='time'?' active':'');
  document.getElementById('mce-reps-fields').style.display=type==='reps'?'':'none';
  document.getElementById('mce-time-fields').style.display=type==='time'?'':'none';
}

function savePlanEx(){
  const isTime=document.getElementById('mce-tt-time').classList.contains('active');
  const data={
    gexId:pendingGexId||null, icon:selIconPlanEx,
    muscle:document.getElementById('mce-muscle').value.trim()||'Allgemein',
    name:document.getElementById('mce-name').value.trim()||t('field.name'),
    type:isTime?'time':'reps',
    reps:document.getElementById('mce-reps')?document.getElementById('mce-reps').value.trim():'',
    sets:parseInt(document.getElementById('mce-sets')?document.getElementById('mce-sets').value:3)||3,
    sithoehe:document.getElementById('mce-sitz')?document.getElementById('mce-sitz').value.trim():'',
    kg:document.getElementById('mce-kg')?document.getElementById('mce-kg').value.trim():'',
    pauseSecs:document.getElementById('mce-pause')&&document.getElementById('mce-pause').value!==''?parseInt(document.getElementById('mce-pause').value):null,
    durationMin:document.getElementById('mce-dur')?document.getElementById('mce-dur').value.trim():'5-10',
    note:document.getElementById('mce-note')?document.getElementById('mce-note').value.trim():'',
    phaseId:document.getElementById('mce-phase')?document.getElementById('mce-phase').value||null:null
  };
  const plan=getPlanById(editingPlanId);
  if(editingPlanExId){ const idx=plan.exercises.findIndex(e=>e.id===editingPlanExId); if(idx>=0) plan.exercises[idx]={...plan.exercises[idx],...data}; }
  else plan.exercises.push({id:uid(),...data});
  saveState(); closeModal('modalCustomizeEx'); renderPlanExercises();
  document.getElementById('pd-meta').textContent=plan.phases.length+' '+t('phases')+' · '+plan.exercises.length+' '+t('exercises');
}

// ══════════════════════════════════════════════
// PLAN MANAGEMENT
// ══════════════════════════════════════════════
let renamingPlanId=null;
function createPlan(mode){
  const name=document.getElementById('newPlanName').value.trim()||t('plan.'+mode);
  const newId=uid(); let phases,exercises;
  if(mode==='copy'){ const ap=activePlan(); phases=ap.phases.map(ph=>({...ph,id:uid()})); const phMap={}; ap.phases.forEach((ph,i)=>phMap[ph.id]=phases[i].id); exercises=ap.exercises.map(e=>({...e,id:uid(),phaseId:e.phaseId?phMap[e.phaseId]:null})); }
  else { const pid=uid(); phases=[{id:pid,name:'Phase 1',colorIdx:0}]; exercises=[]; }
  state.plans.push({id:newId,name,phases,exercises}); state.activePlanId=newId; saveState();
  closeModal('modalAddPlan'); renderPlanSwitcher(); renderPlansList(); renderWorkout();
}
function openRenamePlan(planId){ renamingPlanId=planId; document.getElementById('renamePlanInput').value=state.plans.find(p=>p.id===planId)?.name||''; openModal('modalRenamePlan'); }
function confirmRenamePlan(){ const name=document.getElementById('renamePlanInput').value.trim(); if(name){const p=state.plans.find(p=>p.id===renamingPlanId);if(p)p.name=name;} saveState();closeModal('modalRenamePlan');renderPlanSwitcher();renderPlansList(); }
function deletePlanModal(){ if(state.plans.length<=1){alert(t('alert.last-plan'));return;} if(!confirm(t('confirm.del-plan')))return; state.plans=state.plans.filter(p=>p.id!==renamingPlanId); if(state.activePlanId===renamingPlanId)state.activePlanId=state.plans[0].id; saveState();closeModal('modalRenamePlan');renderPlanSwitcher();renderPlansList();renderWorkout(); }
function deletePlanById(planId){ if(state.plans.length<=1){alert(t('alert.last-plan'));return;} if(!confirm(t('confirm.del-plan')))return; state.plans=state.plans.filter(p=>p.id!==planId); if(state.activePlanId===planId)state.activePlanId=state.plans[0].id; saveState();renderPlanSwitcher();renderPlansList();renderWorkout(); }

// ══════════════════════════════════════════════
// EXPORT / IMPORT
// ══════════════════════════════════════════════
function exportData(){
  const json=JSON.stringify(state,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=t('export.filename'); a.click();
  URL.revokeObjectURL(url);
}
function triggerImport(){ document.getElementById('import-file').click(); }
function importData(event){
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const imported=JSON.parse(e.target.result);
      if(!imported.plans||!imported.activePlanId) throw new Error('invalid');
      Object.assign(state,imported);
      lang=state.lang||'de';
      saveState(); location.reload();
    } catch(err){ alert(t('import.error')); }
  };
  reader.readAsText(file);
  event.target.value='';
}

// ══════════════════════════════════════════════
// NEW WORKOUT / RESET
// ══════════════════════════════════════════════
function newWorkout(){
  if(!confirm(t('confirm.new-workout')))return;
  const prog=getProg(state.activePlanId);
  const hasProgress=prog.doneExercises.length>0||Object.values(prog.completedSets).some(v=>v>0);
  if(hasProgress) saveHistory();
  state.progress[state.activePlanId]={completedSets:{},doneExercises:[]};
  saveState();clearInterval(wuInt);wuRunning=false;swStopAll();
  workoutMode='home'; showScreen('workout');window.scrollTo(0,0);
}
function confirmResetAll(){ if(!confirm(t('confirm.reset-all')))return; localStorage.removeItem('tp4_state');location.reload(); }

// ══════════════════════════════════════════════
// HISTORY
// ══════════════════════════════════════════════
function saveHistory(){
  const plan=activePlan(), prog=getProg(state.activePlanId);
  const exercises=plan.exercises.map(ex=>({
    id:ex.id, icon:ex.icon, name:ex.name, muscle:ex.muscle, type:ex.type,
    sets:ex.sets, reps:ex.reps, durationMin:ex.durationMin, kg:ex.kg,
    setsCompleted: prog.completedSets[ex.id]||0,
    done: prog.doneExercises.includes(ex.id)
  }));
  const totalSets=Object.values(prog.completedSets).reduce((a,b)=>a+b,0);
  const doneCount=prog.doneExercises.length;
  state.history.unshift({
    id:uid(),
    date:new Date().toLocaleDateString('de-DE'),
    time:new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}),
    plan:plan.name, planId:plan.id,
    totalExercises:plan.exercises.length,
    doneExercises:doneCount,
    totalSets, exercises
  });
  saveState();
}

function renderHistory(){
  const cont=document.getElementById('history-content');
  const prog=getProg(state.activePlanId), allDone=prog.doneExercises.length===activePlan().exercises.length&&activePlan().exercises.length>0;
  let h='';
  if(allDone) h+=`<div class="congrats"><div class="big">🏆</div><h2>${t('congrats.title')}</h2><p>${t('congrats.sub')}</p></div>`;
  if(!state.history.length&&!allDone){cont.innerHTML=h+`<div class="empty-state"><div class="big">📋</div>${t('no-history')}</div>`;return;}
  state.history.forEach(entry=>{
    const pct=entry.totalExercises?Math.round(entry.doneExercises/entry.totalExercises*100):0;
    h+=`<div class="h-card" onclick="openHistoryDetail('${entry.id}')">
      <div class="h-title">${entry.plan} · ${entry.date} <span class="h-card-arrow">›</span></div>
      <div class="h-row"><span>${t('history.time')}</span><span class="h-val">${entry.time}</span></div>
      <div class="h-row"><span>${t('history.detail.exercises')}</span><span class="h-val">${entry.doneExercises||0}/${entry.totalExercises||0}</span></div>
      <div class="h-row"><span>${t('history.sets')}</span><span class="h-val">${entry.totalSets||0}</span></div>
    </div>`;
  });
  cont.innerHTML=h;
}

function openHistoryDetail(entryId){
  const entry=state.history.find(e=>e.id===entryId); if(!entry) return;
  document.getElementById('hd-title').textContent=entry.plan.toUpperCase();
  document.getElementById('hd-sub').textContent=entry.date+' · '+entry.time;
  // Info boxes
  const pct=entry.totalExercises?Math.round((entry.doneExercises||0)/entry.totalExercises*100):0;
  document.getElementById('hd-info').innerHTML=`
    <div class="info-box"><div class="ib-label">${t('history.detail.exercises')}</div><div class="ib-val">${entry.doneExercises||0}/${entry.totalExercises||0}</div><div class="ib-sub">${pct}%</div></div>
    <div class="info-box"><div class="ib-label">${t('history.sets')}</div><div class="ib-val">${entry.totalSets||0}</div><div class="ib-sub">${t('field.sets').toLowerCase()}</div></div>
    <div class="info-box"><div class="ib-label">${t('history.time')}</div><div class="ib-val">${entry.time}</div><div class="ib-sub">${entry.date}</div></div>
    <div class="info-box"><div class="ib-label">${t('history.detail.plan')}</div><div class="ib-val" style="font-size:14px;margin-top:4px">${entry.plan}</div><div class="ib-sub">&nbsp;</div></div>`;
  // Exercise list
  const exList=entry.exercises||[];
  document.getElementById('hd-exercises').innerHTML=exList.map(ex=>{
    const statusIcon=ex.done?'✅':'⬜';
    const meta=ex.type==='time'?(ex.durationMin||'?')+' '+t('min.abbr'):(ex.setsCompleted||0)+'/'+ex.sets+' '+t('field.sets').toLowerCase()+(ex.reps?' · '+ex.reps+' '+t('reps.abbr'):'')+(ex.kg?' · '+ex.kg+'kg':'');
    return `<div class="hd-ex-row">
      <div class="hd-ex-icon">${ex.icon}</div>
      <div class="hd-ex-info"><div class="hd-ex-name">${ex.name}</div><div class="hd-ex-meta">${ex.muscle} · ${meta}</div></div>
      <div class="hd-ex-status">${statusIcon}</div>
    </div>`;
  }).join('');
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-history-detail').classList.add('active');
}

// ══════════════════════════════════════════════
// MODALS
// ══════════════════════════════════════════════
function openModal(id){ document.getElementById(id).classList.add('active'); }
function closeModal(id){ document.getElementById(id).classList.remove('active'); }

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
applyTranslations();
renderPlanSwitcher();
workoutMode = 'home';
renderWorkout();
</script>
